services:
  - type: web
    name: loan-app-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "False"
      - key: GOOGLE_SHEETS_ID
        sync: false
      - key: GOOGLE_FORM_RESPONSE_SHEET
        value: Form Responses 1
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: CORS_ORIGINS
        sync: false
